<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Flow Widget</title>

  <style>
    :root {
      --bg: #fffaf8;
      --card: #ffffff;
      --ink: #4b342f;
      --muted: #9a817b;
      --pink: #d98999;
      --soft-pink: #f9eeee;
      --border: #ead8d3;
      --shadow: rgba(119, 87, 78, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: transparent;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
    }

    body {
      overflow: hidden;
    }

    .weekly-widget {
      width: 100%;
      max-width: none;
      padding: 22px 24px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--bg);
      box-shadow: 0 10px 28px var(--shadow);
    }

    .top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      width: 100%;
    }

    .title-block {
      flex: 1;
      min-width: 180px;
    }

    .section-title {
      margin: 0;
      color: var(--pink);
      font-size: clamp(23px, 4vw, 34px);
      letter-spacing: 0.07em;
      font-weight: 500;
      font-style: italic;
      line-height: 1;
      white-space: nowrap;
    }

    .subtitle {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-style: italic;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 9px;
      flex-wrap: wrap;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    .nav-btn,
    .today-btn {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--ink);
      border-radius: 999px;
      height: 30px;
      padding: 0 11px;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
      box-shadow: 0 5px 14px rgba(119, 87, 78, 0.04);
    }

    .nav-btn {
      width: 30px;
      padding: 0;
      font-size: 17px;
      line-height: 1;
    }

    .today-btn {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .nav-btn:hover,
    .today-btn:hover {
      background: var(--soft-pink);
      border-color: #dfc0c5;
      transform: translateY(-1px);
    }

    .date-range {
      min-width: 145px;
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.03em;
      color: var(--ink);
    }

    .intention-strip {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding-top: 16px;
      border-top: 1px solid rgba(234, 216, 211, 0.85);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .mini-card {
      border: 1px solid rgba(234, 216, 211, 0.95);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
      padding: 12px 14px;
      min-height: 72px;
    }

    .mini-label {
      display: block;
      color: var(--pink);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .mini-text {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.4;
    }

    .editable {
      outline: none;
      min-height: 36px;
      cursor: text;
      white-space: pre-wrap;
    }

    .editable:focus {
      background: var(--soft-pink);
      border-radius: 10px;
      padding: 4px 6px;
      margin: -4px -6px;
    }

    .editable:empty::before {
      content: "Click to write...";
      color: rgba(154, 129, 123, 0.65);
      font-style: italic;
    }

    @media (max-width: 720px) {
      .weekly-widget {
        padding: 18px;
        border-radius: 18px;
      }

      .top-row {
        flex-direction: column;
        gap: 14px;
      }

      .controls {
        justify-content: flex-start;
        width: 100%;
      }

      .date-range {
        text-align: left;
        min-width: 135px;
      }

      .section-title {
        white-space: normal;
      }

      .intention-strip {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <section class="weekly-widget" aria-label="Weekly Flow">
    <div class="top-row">
      <div class="title-block">
        <h1 class="section-title">✧ WEEKLY FLOW ✧</h1>
        <p class="subtitle">Plan your week. Build your days.</p>
      </div>

      <div class="controls" aria-label="Week controls">
        <button class="nav-btn" id="previousWeek" aria-label="Previous week">‹</button>
        <div class="date-range" id="dateRange">11 – 17 May 2026</div>
        <button class="nav-btn" id="nextWeek" aria-label="Next week">›</button>
        <button class="today-btn" id="thisWeek">This week</button>
      </div>
    </div>

    <div class="intention-strip">
      <div class="mini-card">
        <span class="mini-label">Intention</span>
        <div class="mini-text editable" contenteditable="true" data-key="weeklyIntention">Be consistent, not perfect.</div>
      </div>

      <div class="mini-card">
        <span class="mini-label">Focus</span>
        <div class="mini-text editable" contenteditable="true" data-key="weeklyFocus">Choose the few things that move life forward.</div>
      </div>

      <div class="mini-card">
        <span class="mini-label">Energy</span>
        <div class="mini-text editable" contenteditable="true" data-key="weeklyEnergy">Plan softly. Leave breathing room.</div>
      </div>
    </div>
  </section>

  <script>
    const dateRange = document.getElementById("dateRange");

    function getMonday(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      d.setDate(diff);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    let currentMonday = getMonday(new Date());

    function formatRange(startDate) {
      const endDate = new Date(startDate);
      endDate.setDate(startDate.getDate() + 6);

      const startDay = startDate.getDate();
      const endDay = endDate.getDate();
      const startMonth = startDate.toLocaleString("en-GB", { month: "short" });
      const endMonth = endDate.toLocaleString("en-GB", { month: "short" });
      const year = endDate.getFullYear();

      if (startMonth === endMonth) {
        return `${startDay} – ${endDay} ${endMonth} ${year}`;
      }

      return `${startDay} ${startMonth} – ${endDay} ${endMonth} ${year}`;
    }

    function updateRange() {
      dateRange.textContent = formatRange(currentMonday);
    }

    document.getElementById("previousWeek").addEventListener("click", () => {
      currentMonday.setDate(currentMonday.getDate() - 7);
      updateRange();
    });

    document.getElementById("nextWeek").addEventListener("click", () => {
      currentMonday.setDate(currentMonday.getDate() + 7);
      updateRange();
    });

    document.getElementById("thisWeek").addEventListener("click", () => {
      currentMonday = getMonday(new Date());
      updateRange();
    });

    document.querySelectorAll(".editable").forEach((field) => {
      const key = field.dataset.key;
      const saved = localStorage.getItem(key);

      if (saved) {
        field.textContent = saved;
      }

      field.addEventListener("input", () => {
        localStorage.setItem(key, field.textContent.trim());
      });

      field.addEventListener("paste", (event) => {
        event.preventDefault();
        const text = event.clipboardData.getData("text/plain");
        document.execCommand("insertText", false, text);
      });
    });

    updateRange();
  </script>
</body>
</html>
