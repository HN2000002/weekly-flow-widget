<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Flow Widget</title>

  <style>
    :root {
      --bg: #fffdfb;
      --ink: #4b342f;
      --muted: #9a817b;
      --pink: #d98999;
      --soft-pink: #f8e8e8;
      --border: #ead8d3;
      --shadow: rgba(119, 87, 78, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: transparent;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
    }

    .weekly-widget {
      width: min(980px, 100%);
      padding: 22px 26px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background:
        radial-gradient(circle at top left, rgba(248, 232, 232, 0.9), transparent 34%),
        linear-gradient(135deg, rgba(255, 253, 251, 0.96), rgba(255, 248, 247, 0.86));
      box-shadow: 0 16px 40px var(--shadow);
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .title-block {
      min-width: 240px;
    }

    .section-title {
      margin: 0;
      color: var(--pink);
      font-size: clamp(24px, 3vw, 36px);
      letter-spacing: 0.08em;
      font-weight: 500;
      font-style: italic;
      line-height: 1;
    }

    .subtitle {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-style: italic;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    .nav-btn,
    .today-btn {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      border-radius: 999px;
      height: 32px;
      padding: 0 12px;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
      box-shadow: 0 8px 18px rgba(119, 87, 78, 0.05);
    }

    .nav-btn {
      width: 32px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
    }

    .today-btn {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .nav-btn:hover,
    .today-btn:hover {
      transform: translateY(-1px);
      background: var(--soft-pink);
      border-color: #e0bdc3;
    }

    .date-range {
      min-width: 155px;
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.03em;
      color: var(--ink);
    }

    .intention-strip {
      margin-top: 18px;
      display: none;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding-top: 16px;
      border-top: 1px solid rgba(234, 216, 211, 0.75);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .intention-strip.show {
      display: grid;
    }

    .mini-card {
      border: 1px solid rgba(234, 216, 211, 0.9);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.55);
      padding: 12px 14px;
      min-height: 58px;
    }

    .mini-label {
      display: block;
      color: var(--pink);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .mini-text {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.35;
    }

    .editable {
      outline: none;
      min-height: 34px;
      cursor: text;
      white-space: pre-wrap;
    }

    .editable:focus {
      background: rgba(248, 232, 232, 0.55);
      border-radius: 10px;
      padding: 4px 6px;
      margin: -4px -6px;
    }

    .editable:empty::before {
      content: "Click to write...";
      color: rgba(154, 129, 123, 0.65);
      font-style: italic;
    }

    .toggle-row {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .toggle-details {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      padding: 4px 2px;
    }

    @media (max-width: 680px) {
      .weekly-widget {
        padding: 18px;
        border-radius: 18px;
      }

      .top-row {
        align-items: flex-start;
        flex-direction: column;
        gap: 16px;
      }

      .controls {
        justify-content: flex-start;
        width: 100%;
      }

      .date-range {
        text-align: left;
        min-width: 140px;
      }

      .intention-strip.show {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <section class="weekly-widget" aria-label="Weekly Flow">
    <div class="top-row">
      <div class="title-block">
        <h1 class="section-title">✧ WEEKLY FLOW ✧</h1>
        <p class="subtitle">Plan your week. Build your days.</p>
      </div>

      <div class="controls" aria-label="Week controls">
        <button class="nav-btn" id="previousWeek" aria-label="Previous week">‹</button>
        <div class="date-range" id="dateRange">11 – 17 May 2026</div>
        <button class="nav-btn" id="nextWeek" aria-label="Next week">›</button>
        <button class="today-btn" id="thisWeek">This week ▾</button>
      </div>
    </div>

    <div class="intention-strip" id="detailsPanel">
      <div class="mini-card">
        <span class="mini-label">Intention</span>
        <div class="mini-text editable" contenteditable="true" data-key="weeklyIntention">
Be consistent, not perfect.
        </div>
      </div>

      <div class="mini-card">
        <span class="mini-label">Focus</span>
        <div class="mini-text editable" contenteditable="true" data-key="weeklyFocus">
Choose the few things that move life forward.
        </div>
      </div>

      <div class="mini-card">
        <span class="mini-label">Energy</span>
        <div class="mini-text editable" contenteditable="true" data-key="weeklyEnergy">
Plan softly. Leave breathing room.
        </div>
      </div>
    </div>

    <div class="toggle-row">
      <button class="toggle-details" id="toggleDetails">show weekly intention +</button>
    </div>
  </section>

  <script>
    const dateRange = document.getElementById("dateRange");
    const detailsPanel = document.getElementById("detailsPanel");
    const toggleDetails = document.getElementById("toggleDetails");

    function getMonday(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      d.setDate(diff);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    let currentMonday = getMonday(new Date());

    function formatRange(startDate) {
      const endDate = new Date(startDate);
      endDate.setDate(startDate.getDate() + 6);

      const startDay = startDate.getDate();
      const endDay = endDate.getDate();
      const startMonth = startDate.toLocaleString("en-GB", { month: "short" });
      const endMonth = endDate.toLocaleString("en-GB", { month: "short" });
      const year = endDate.getFullYear();

      if (startMonth === endMonth) {
        return `${startDay} – ${endDay} ${endMonth} ${year}`;
      }

      return `${startDay} ${startMonth} – ${endDay} ${endMonth} ${year}`;
    }

    function updateRange() {
      dateRange.textContent = formatRange(currentMonday);
    }

    document.getElementById("previousWeek").addEventListener("click", () => {
      currentMonday.setDate(currentMonday.getDate() - 7);
      updateRange();
    });

    document.getElementById("nextWeek").addEventListener("click", () => {
      currentMonday.setDate(currentMonday.getDate() + 7);
      updateRange();
    });

    document.getElementById("thisWeek").addEventListener("click", () => {
      currentMonday = getMonday(new Date());
      updateRange();
    });

    toggleDetails.addEventListener("click", () => {
      detailsPanel.classList.toggle("show");

      toggleDetails.textContent = detailsPanel.classList.contains("show")
        ? "hide weekly intention −"
        : "show weekly intention +";
    });

    document.querySelectorAll(".editable").forEach((field) => {
      const key = field.dataset.key;
      const saved = localStorage.getItem(key);

      if (saved) {
        field.textContent = saved;
      } else {
        field.textContent = field.textContent.trim();
      }

      field.addEventListener("input", () => {
        localStorage.setItem(key, field.textContent.trim());
      });

      field.addEventListener("paste", (event) => {
        event.preventDefault();
        const text = event.clipboardData.getData("text/plain");
        document.execCommand("insertText", false, text);
      });
    });

    updateRange();
  </script>
</body>
</html>
